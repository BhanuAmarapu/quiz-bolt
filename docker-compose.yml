version: '3.8'

services:
  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: quiz-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: quiz_platform
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - quiz-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache and session store
  redis:
    image: redis:7-alpine
    container_name: quiz-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - quiz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API service
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: quiz-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: ${SERVER_PORT:-5000}
      MONGO_URI: ${MONGO_URI:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/quiz_platform?authSource=admin}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_jwt_secret_here}
      REDIS_URL: redis://redis:6379
      PAYMENT_SERVICE_URL: http://payment-service:5001
      CLIENT_URL: http://localhost:80
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quiz-network

  # Payment microservice
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: quiz-payment
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: ${PAYMENT_SERVICE_PORT:-5001}
      DATABASE_URL: ${DATABASE_URL:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/quiz_platform?authSource=admin}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-your_webhook_secret}
      CORS_ORIGIN: http://localhost:80
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - quiz-network

  # Frontend client (Nginx + React)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: quiz-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
      - payment-service
    networks:
      - quiz-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  quiz-network:
    driver: bridge
